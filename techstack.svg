<svg viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .scroll-wrapper {
      animation: scroll-left 20s linear infinite;
    }
    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-450px); } /* Sesuaikan dengan setengah total lebar */
    }
  </style>

  <g class="scroll-wrapper">
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/React-Dark.svg" x="0" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/NextJS-Dark.svg" x="100" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/TypeScript.svg" x="200" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/TailwindCSS-Dark.svg" x="300" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Kotlin-Dark.svg" x="400" y="25" height="50" width="50" />
    
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/React-Dark.svg" x="500" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/NextJS-Dark.svg" x="600" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/TypeScript.svg" x="700" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/TailwindCSS-Dark.svg" x="800" y="25" height="50" width="50" />
    <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Kotlin-Dark.svg" x="900" y="25" height="50" width="50" />
  </g>
</svg>
